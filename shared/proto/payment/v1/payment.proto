syntax = "proto3";

package payment.v1;

option go_package = "github.com/mercuryqa/shared/pkg/proto/payment/v1;paymentv1";

// PaymentService обрабатывает оплату заказов
service PaymentService {
  // PayOrder обрабатывает оплату заказа
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// PaymentMethod способ оплаты
enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  PAYMENT_METHOD_CARD = 1;
  PAYMENT_METHOD_SBP = 2;
  PAYMENT_METHOD_CREDIT_CARD = 3;
  PAYMENT_METHOD_INVESTOR_MONEY = 4;
}

// PayOrderRequest запрос на оплату заказа
message PayOrderRequest {
  // UUID заказа
  string order_uuid = 1;
  // PaymentMethod выбранный способ оплаты
  PaymentMethod payment_method = 2;
}

// PayOrderResponse ответ на метод, содержащий uuid транзакции оплаты
message PayOrderResponse {
  // Transaction_uuid UUID транзакции оплаты
  string transaction_uuid = 1;
}
